        for(let i=0; i<=5; i++){
            for(let j=0; j<5-i; j++){
                document.write("&nbsp;&nbsp;&nbsp;");
            }
            for(let k=0; k<=i; k++){
                document.write("* ");
            }
            for(let l=0; l<i; l++){
                document.write("* ");
            }
            document.write("<br>");
        }


        // hollow star pattern
        //M alphabet pattern
        for(let i=1; i<=5; i++){
            for(let j=1; j<=5; j++){
                if(j==1 || j==5){
                    document.write("* ");
                }
                else if(i==2 && j==2){
                    document.write("* ");
                }
                else if (i == 2 && j == 4) {
                    document.write("* ");
                }
                else if (i == 3 && j == 3) {
                    document.write("* ");
                }
                else{
                    document.write("&nbsp;&nbsp;&nbsp;");
                }
            }
            document.write("<br>");
        }
