<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Literals & JSON</title>
</head>

<body>

    <script>

        //object - entity - stores data as a collection of properties in key value pair format

        const person = {
            name: "Raj",
            age: 22,
            gender: "Male"
        }

        document.write("Name: ", person.name, "<br>")
        document.write("Age: ", person.age, "<br>")
        document.write("Gender: ", person.gender, "<br><br>")

        //template literals: used to avoid printing everything separately
        // (``) - syntax

        const person1 = {
                name: "Rani",
                age: 21,
                gender: "Female"
            }
        const person2 = {
            name: "John",
            age: 23,
            gender: "Male"
        }
        const person3 = {
            name: "jin",
            age: 24,
            gender: "Female"
        }

        document.write(`Name: ${person1.name} <br> Age: ${person1.age} <br> Gender: ${person1.gender} <br><br>`)
        document.write(`Name: ${person2.name} <br> Age: ${person2.age} <br> Gender: ${person2.gender} <br><br>`)
        document.write(`Name: ${person3.name} <br> Age: ${person3.age} <br> Gender: ${person3.gender} <br><br>`)


        //JSON - Javascript object notation
        //obj stored in array format
        
        const data = [
            {
                name: "Rani",
                age: 21,
                gender: "Female"
            },
            {
                name: "John",
                age: 23,
                gender: "Male"
            },
            {
                name: "jin",
                age: 24,
                gender: "Female"
            }

        ]

        //map function = acts as a loop()
        //avoids using unnecessary memory

       data.map((item,index) => {
        document.write(`Name: ${item.name} <br> Age: ${item.age} <br> Gender: ${item.gender} <br><br>`). //loops over the array
       });
    </script>

</body>

</html>
