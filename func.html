<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>

        /*
            - Fucntions :
                - It is a block of code which is used to execute a some particular task 
                which is runs only when it is called.
                - clear structure to write a code.
                - Reusable
                - Readabiliti++
                - There are two types of functions :
                    1. Pre-defined Functions (in-built)
                        - Array Methods
                        - String Methods
                        - Math Library
    
                    2. User-defined Functions 
                        - Simple Functions 
                        - Function with parameter
                        - Function with return type
                        - Function with parameter & return type
        */

            let a = [1, 2, 3, 4, 5]
            document.write("Elements : ", a, "<br>")

            // Push Method : It is used to add a element to the last of index.
            a.push(6,7,8,9,10)
            document.write("Push Method : ", a, "<br>")

            // Pop Method : It is used to delete a element to the last of index.
            a.pop()
            document.write("Pop Method : ", a, "<br>")
            
            // Shift Method : It is used to delete a element to the first of index.
            a.shift()
            document.write("Shift Method : ", a, "<br>")
            

    </script>
    
</body>
</html>
